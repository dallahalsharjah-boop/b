name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq build-essential git openjdk-17-jdk unzip zip libffi-dev libssl-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev zlib1g-dev
        pip install buildozer cython==0.29.33
    - name: Build APK
      env:
        BUILDOZER_WARN_ON_ROOT: 0
      run: buildozer android debug 2>&1
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: abdullah-nasser-apk
        path: bin/*.apk
        retention-days: 30
