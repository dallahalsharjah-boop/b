name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    steps:
    - uses: actions/checkout@v4
    - name: Build APK
      env:
        BUILDOZER_WARN_ON_ROOT: 0
      run: |
        pip install arabic-reshaper python-bidi hijridate
        yes | buildozer android debug 2>&1
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: abdullah-nasser-apk
        path: bin/*.apk
        retention-days: 30
